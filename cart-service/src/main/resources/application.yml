server:
  port: 9090

spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:mysql://localhost:3306/cart_service?createDatabaseIfNotExist=true
    username: ${USER-NAME}
    password: ${PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:                          # ✅ root level
  internal:
    secret: ${INTERNAL_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true      # ✅ add this
    ip-address: 127.0.0.1        # ✅ add this
    hostname: localhost