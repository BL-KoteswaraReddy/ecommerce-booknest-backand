server:
  port: 8090

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/order_service?createDatabaseIfNotExist=true
    username: ${USER-NAME}
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
        hibernate:
        ddl-auto: update
        show-sql: true
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect

  app: # ✅ root level
    internal:
      secret: 12345
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
instance:
  prefer-ip-address: true
  ip-address: 127.0.0.1        # Force localhost IP
  hostname: localhost
