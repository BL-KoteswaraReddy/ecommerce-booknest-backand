server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # user-service routes (public)
        - id: auth-service
          uri: http://localhost:8888
          predicates:
            - Path=/auth/**

        # product-service routes (protected)
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**

        # cart-service routes (protected)
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/cart/**

        # order-service routes (protected)
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/test/**
app:
  jwt:
    secret: bXlTZWNyZXRLZXlGb3JKV1RNYWtlSXRMb25nRW5vdWdoMjU2Qml0cyEh
    expiration: 86400000
  internal:              # ✅ internal is under app, NOT under jwt
    secret: 12345
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:            # ← under eureka
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
reactor:
  netty:
    pool:
      maxIdleTime: 20000
